body:
  text: 定過亦能破彼是等難故又應定問汝言非顯淨土言中淨土之慧為舉淨土之體為不舉若言舉者則違自宗此淨土教能顯淨土故若不舉者不違他宗非顯之言不淨土故於此兩兩關心辨彼意在前則墮自語相違過失若彼救言此淨土忽舉淨土體而云忽不入淨土之教故無自語相違過者則以此忽亦成不定如是進退皆不應理二量八執四分者為破三分立比量云自證必有即體能證心分攝故猶如相分自證應非心分所攝以無即體之能證故如兔角等判云此二比量是似非真皆不能離不定過故謂自證分為如相分心分攝故有即體能證為如眼識生相心分攝故無即體能證如是前因有不定過又自證分為如兔角無即體能證故非心分攝為如耳識相分三相無即體能證故是心分所攝如是後因亦有不定若彼救言五識三相不離體故是其自證之所緣境理亦不然相分三相不離相故五識見分亦得緣故此若不許彼何得然設許彼前此必不許五識能緣法界諸處法相雜亂違理教故只由如是相分三相於彼二因足作不定設彼救言相分三相非心分攝則有比量相違過失當知第四分有言而無義二量九無性攝論為成第八對彼小乘立二比量謂八識教是聖言攝似無我故如四阿含又八識教契當道理是聖教故如六識教如是展轉證有八識今於此中直就所詮而立比量證謂眼耳鼻識必有舌身意識不攝餘別識非二六門中三識攝故猶如舌身意識此中極成六識為他異品自許八識為自異品三識攝因於彼不轉是故此因決定能立若以轉識攝故為因則於他異轉設以是識性故為因亦於自異品轉皆不能離不定過也三量十成唯識論立比量言第八必有俱有所依是識性故如六識等此因不定有等難故謂有立言第八必無俱有所依是根本故猶如真如若言此有有法差別相違過失能成第八是無為故是則前因亦有是過能成第八是轉識故若言自故不成難彼亦違自故非難也今者別立賴耶末那必無俱有所依之根非六識性之所攝故如眼根等若難此因有相違過能成七八非能緣性如眼根等此亦不然由心所法成不定故若言望前亦有不定以心所法非六識性有所依故此非不定以前立言所依根故若望心所但是所依非所依根法處所攝不待根故是故彼宗雖知依與所依差別未解所依與根有異若論所依通於八識及與心所其所依根不通心所及於七八有破此宗立比量云意識俱有根定非能能緣性六識心心所之所不攝故六識俱有根隨一所攝故如眼根等彼宗反以法處所攝色法為意故作是難此塵通破大乘諸宗然有相違決定過生謂立意根必非色性有分別識不共依故如第六識俱有作意由此等難彼因不定五量十一如聲論師立聲為常所聞性故若對勝論相違決定對佛弟子不共不定以無共許同品法故有難此因立比量言所聞性因應非疑因同品無故如相違因又立此因應非不定異品無故猶如正因備法師云理門論言一向離故是通彼難謂立宗言所聞性因是不定攝一向離故如共不定一向離言闕一相也判云此因有不定過以所見性雖闕一相而非不定是不成故謂立聲無常所見性故此因同有異無唯闕初相是故亦為闕一相也若為避此不定過故更立因言後二相中闕一相故猶如共等四不定因此因亦有餘不定過如於空宗緣生故因雖於後二相中闕一而是真因非不定故故不能作相違決定又前所立異品無故非疑因者亦有不定如諸相違決定之因雖異品無是疑因故唯有同品無故之因且離不定立非疑因此中應立相違比量謂所聞性不定因攝等立相違宗故猶如共不定因如理門論顯此因云以若不共所成立法立所有差別遍攝一切皆是疑因唯彼有性彼所攝故一向離故案云不共所成立者如立聲常所聞性故或立無常所聞性故如是一切無不等立故言所有遍攝一切由是道理所聞性因望彼一切皆是疑因一向離故者轉成等立諸宗之義以望諸宗皆同不共皆同是一向義不共是其離義由一向離故等立於諸宗諸宗相違故其因是不定五量十二相違決定立二比量文軌法師自作問答問具足三相應是正因何故此中而言不定答此疑未決不敢解之有通釋者隨而為注此中問意立比量云違決中因應是正因具三相故如餘真因今者通曰違決之因非正因攝有等難故如相違因由此顯彼有不定過又此二因非相違攝同品有故猶如正因又此二因非不成攝是共許故如不共因如是二因不定因攝非正非違非不成故如餘五種不定因也六量十三或有為難五種之性立比量言無性有情必當作佛以有心故如有性者此因不定故成不難為如諸佛以有心故非當作佛為如菩薩以有心故必當作佛前所立因言以未成佛之有情故此因亦有他不定過為如菩薩種性為如決定二乘若為避此更立宗言無性性有情決定二乘皆當作佛以未成佛有情攝故猶如菩薩此有等難故成不定如是三人非當作佛以無大乘無漏種子而非菩薩種性攝故如木石等諸無情物又有比量相違過失謂五種姓中餘四種姓墮地獄時應有四德許作佛故如菩薩姓許則違教不許違理此違自悟比量過也五量十四成唯識論為破我法立比量言凡諸我見不緣實我有所緣故如緣餘心我見所緣定非實我是所緣故如所餘法又言外道餘乘所執諸法異心心所非實有性是所取故如心心所能取彼覺亦不緣彼是能取故如緣此覺判云此中有四比量是真能破破我法故無過生故或因此破破大乘云諸緣第八識見不緣阿賴耶相有所緣故如緣證成道理甚難思自非笑却微易解今依聖典舉一隅願通佛道流三世咸亨二年歲在辛未七月十六日住行寺著筆租訖新出斷簡何所言類同相異同異二義耳相乖違而言言體一必不應理判云此中有九比量於中前六破彼本宗後之三量破衆賢救謂和合時應非眼等異前眼等故猶如色聲等又類應非同與異體一故猶如異相相亦非異與同一體故故猶如同類遠自比量故不應理此中或有破大乘謂大乘色處應非假色是所知故如聲處等餘處亦爾若大乘宗許有假色則不能離如是等過然此大乘亦不許有如言假色説有實色故彼量便立己成蘊界處等一切法門皆於言假施設故十量判比量論跋文證成道理甚難思自非笑却微易解今依聖典舉一隅願通佛道流三世判比量論一局釋元曉述咸亨二年歲在辛未七月十六日住行名寺著筆租訖
